name: CI

on:
  push:
    branches: [main]
  # The fast gate (gofmt/vet/build/test -race) runs on EVERY PR — it is the
  # required status check that auto-merge waits on, and a required check that
  # gets path-filtered out never reports, deadlocking the merge. ~2 min on a
  # docs-only PR is the price of auto-merge meaning something.
  pull_request:
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/corral
  KUBECTL_VERSION: v1.36.1
  VIRTCTL_VERSION: v1.8.2

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      # Real-tool tests (qcow2 conversion, rclone round-trip) run here instead of
      # skipping — see TestConvertRawToQcow2_Real / TestRclone_RealCopytoRoundTrip.
      - name: Install test tools (qemu-img, rclone)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-utils rclone

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "gofmt needed on:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: |
          go vet ./...
          go vet -tags bootc ./...

      - name: go build
        run: |
          go build ./...
          go build -tags bootc ./...

      - name: go test (race)
        run: go test -race -count=1 -timeout 120s ./...

      - name: go test (bootc tag)
        run: go test -tags bootc -race -count=1 -timeout 120s ./...

      - name: coverage
        run: |
          go test -count=1 -timeout 120s -coverprofile=cover.out ./...
          go tool cover -func=cover.out | tail -1
          {
            echo '### Test coverage'
            echo '```'
            go tool cover -func=cover.out | tail -20
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: cover.out

  publish-image:
    # corral-web image: the web UI served on the cluster (deploy/corral-web.yaml)
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Build binary and fetch kubectl/virtctl
        run: |
          mkdir -p build
          # bootc tag included: the on-cluster web UI must offer the bootc
          # create flow (build a container image into a VM disk).
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -tags bootc -ldflags="-s -w" -o build/corral .
          curl -fsSLo build/kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          curl -fsSLo build/virtctl "https://github.com/kubevirt/kubevirt/releases/download/${VIRTCTL_VERSION}/virtctl-${VIRTCTL_VERSION}-linux-amd64"

      - name: Log in to ghcr
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          docker build -f Containerfile \
            -t "$IMAGE:latest" -t "$IMAGE:${GITHUB_SHA::7}" .
          docker push "$IMAGE:latest"
          docker push "$IMAGE:${GITHUB_SHA::7}"

  release-binaries:
    # Publishes static binaries to a rolling "binaries" release so consumers
    # (e.g. the dotfiles ansible role) can fetch a stable URL:
    # https://github.com/hanthor/corral/releases/download/binaries/corral-linux-<arch>
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Build static binaries
        run: |
          mkdir -p dist
          for arch in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH=$arch \
              go build -ldflags="-s -w" -o "dist/corral-linux-$arch" .
          done
          (cd dist && sha256sum * > SHA256SUMS)
          ls -lh dist/

      - uses: actions/upload-artifact@v7
        with:
          name: corral-binaries
          path: dist/

      - name: Publish to the rolling "binaries" release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view binaries >/dev/null 2>&1 \
            || gh release create binaries --title "Corral binaries" \
                 --notes "Rolling release of corral binaries built from main (auto-updated by CI)." --latest=false
          gh release upload binaries dist/* --clobber

  publish-plugins:
    # Builds marketplace plugin binaries and publishes them to a rolling
    # "plugins" release that marketplace/index.json points at.
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Build marketplace plugins (linux amd64 + arm64)
        run: |
          mkdir -p plugins-dist
          for plugin in bootc snapsched schedule gpu windows proxmox backup; do
            tags=""
            [ "$plugin" = bootc ] && tags="-tags bootc"
            for arch in amd64 arm64; do
              CGO_ENABLED=0 GOOS=linux GOARCH=$arch \
                go build $tags -ldflags="-s -w" \
                -o "plugins-dist/corral-$plugin-linux-$arch" "./cmd/corral-$plugin"
            done
          done
          ls -lh plugins-dist/

      - name: Publish to the rolling "plugins" release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view plugins >/dev/null 2>&1 \
            || gh release create plugins --title "Corral plugins" \
                 --notes "Rolling release of marketplace plugin binaries (auto-updated by CI)." --latest=false
          gh release upload plugins plugins-dist/* --clobber
