name: Catalog regen

# Regenerates the bootc catalog from live ghcr.io registries (Universal Blue,
# Project Bluefin, TunaOS) and auto-PRs changes. Images older than 60 days
# are dropped, so the catalog degrades without periodic regeneration.
#
# Pattern: autocommit → force-push branch → open/update PR (see
# https://mikemcquaid.com/make-github-actions-do-more-for-you/#-autocommits).

on:
  schedule:
    # Daily at 08:00 UTC.
    - cron: "0 8 * * *"
  workflow_dispatch:
  # Dry-run validation when the regen machinery itself changes.
  push:
    paths:
      - "scripts/regen-catalog.py"
      - "pkg/catalog/catalog_generated.go"
      - "pkg/catalog/bootc.go"
      - "pkg/catalog/catalog.go"
      - ".github/workflows/catalog-regen.yml"

permissions:
  contents: write      # push the branch
  pull-requests: write # create/update PR

jobs:
  regen:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Regenerate the catalog
        run: python3 scripts/regen-catalog.py

      - name: gofmt
        run: gofmt -w pkg/catalog/catalog_generated.go

      - name: Verify it compiles and passes catalog tests
        run: |
          go build ./...
          go test ./pkg/catalog/

      - name: Commit and open (or update) a PR
        env:
          BRANCH: autogenerated-catalog
        run: |
          # Nothing changed: clean exit, no branch, no PR.
          git diff --quiet && exit 0

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git switch -C "${BRANCH}"
          git add pkg/catalog/catalog_generated.go
          git commit -m "chore: regenerate bootc catalog

          Automated by catalog-regen workflow — images older than 60 days
          are dropped, fresh tags are added."

          # Force-push so the branch always matches the latest run.
          git push --force origin "${BRANCH}"

          # Open the PR only if one isn't already there.
          if gh pr view "${BRANCH}" --json number &>/dev/null; then
            echo "PR for ${BRANCH} already exists — updated by force-push"
          else
            gh pr create --head "${BRANCH}" \
              --title "chore: regenerate bootc catalog" \
              --body "Automated catalog regeneration. Drops images older than 60 days and adds fresh tags from ghcr.io.

          Run triggered by: ${GITHUB_EVENT_NAME}
          [Workflow run](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})"
          fi
