# Corral web UI — Proxmox-style dashboard for KubeVirt, served in-cluster.
# Image: built from the corral repo Containerfile, pushed to
# ghcr.io/hanthor/corral (public — no pull secret needed).
# Reachable at https://corral.<tailnet>.ts.net via the Tailscale operator
# (Ingress with ingressClassName: tailscale terminates HTTPS).
---
apiVersion: v1
kind: Namespace
metadata:
  name: tailvm
  labels:
    pod-security.kubernetes.io/enforce: privileged
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: corral-web
  namespace: tailvm
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: corral-web
rules:
  - apiGroups: ["kubevirt.io"]
    resources: ["virtualmachines", "virtualmachineinstances"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["subresources.kubevirt.io"]
    resources:
      - virtualmachines/start
      - virtualmachines/stop
      - virtualmachines/restart
      - virtualmachines/migrate
      - virtualmachines/addvolume
      - virtualmachines/removevolume
      - virtualmachineinstances/vnc
      - virtualmachineinstances/console
      - virtualmachineinstances/pause
      - virtualmachineinstances/unpause
      - virtualmachineinstances/guestosinfo
      - virtualmachineinstances/filesystemlist
      - virtualmachineinstances/userlist
    verbs: ["get", "update"]
  # Snapshot / restore / clone / export (Proxmox-parity ops)
  - apiGroups: ["snapshot.kubevirt.io"]
    resources: ["virtualmachinesnapshots", "virtualmachinerestores"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: ["clone.kubevirt.io"]
    resources: ["virtualmachineclones"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: ["export.kubevirt.io"]
    resources: ["virtualmachineexports"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: ["cdi.kubevirt.io"]
    resources: ["datavolumes"]
    verbs: ["get", "list", "create", "delete"]
  # PVC: create (new disks), patch (online expand), delete (cleanup)
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "create", "patch", "update", "delete"]
  # Capability detection (storage classes + snapshot classes)
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshotclasses", "volumesnapshots"]
    verbs: ["get", "list"]
  # Export download: virtctl vmexport --port-forward needs the token secret +
  # a port-forward to the exporter pod.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/portforward"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create", "patch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  # VM deletion also cleans up per-VM proxy resources (tailvm CLI feature)
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "delete"]
  - apiGroups: [""]
    resources: ["services", "serviceaccounts"]
    verbs: ["get", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: corral-web
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: corral-web
subjects:
  - kind: ServiceAccount
    name: corral-web
    namespace: tailvm
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: corral-web
  namespace: tailvm
  labels:
    app: corral-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: corral-web
  template:
    metadata:
      labels:
        app: corral-web
    spec:
      serviceAccountName: corral-web
      containers:
        - name: corral-web
          image: ghcr.io/hanthor/corral:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8006
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 8006
            initialDelaySeconds: 2
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: corral-web
  namespace: tailvm
spec:
  selector:
    app: corral-web
  ports:
    - name: http
      port: 80
      targetPort: 8006
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: corral-web
  namespace: tailvm
spec:
  defaultBackend:
    service:
      name: corral-web
      port:
        number: 80
  ingressClassName: tailscale
  tls:
    - hosts:
        - corral
